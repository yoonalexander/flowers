    <!-- Private + neutral: no names or proposal details leak into link previews. -->
    <meta
      name="description"
      content="A small, handcrafted interactive bouquet made with care."
    />

    <meta property="og:title" content="Flowers for You" />

      property="og:description"
      content="A small, handcrafted interactive bouquet made with care."
    />

    />
